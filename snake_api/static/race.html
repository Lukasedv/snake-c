<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Race</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      width: 100%;
      max-width: 1200px;
    }
    header h1 { font-size: 1.4rem; color: #3fb950; }
    .room-tag {
      font-family: monospace;
      background: #161b22;
      border: 1px solid #30363d;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-size: 0.85rem;
      color: #8b949e;
    }
    .role-tag {
      background: #2d1f6e;
      color: #a5a3ff;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-size: 0.8rem;
    }
    .back-link { margin-left: auto; color: #8b949e; text-decoration: none; font-size: 0.85rem; }
    .back-link:hover { color: #e6edf3; }

    /* ── status bar ───────────────────────────────────────────────── */
    #status-bar {
      width: 100%;
      max-width: 1200px;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.65rem 1rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    #status-text { color: #e3b341; font-weight: 600; }
    #target-text { color: #8b949e; margin-left: auto; }
    #countdown-overlay {
      display: none;
      font-size: 5rem;
      font-weight: 900;
      color: #3fb950;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #winner-overlay {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
    }
    #winner-overlay h2 { font-size: 2.5rem; color: #e3b341; }
    #winner-overlay p  { color: #8b949e; }
    .btn-restart {
      margin-top: 0.5rem;
      padding: 0.65rem 1.5rem;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-start {
      padding: 0.45rem 1rem;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── boards ───────────────────────────────────────────────────── */
    #boards {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      width: 100%;
      max-width: 1200px;
      justify-content: center;
    }

    .board-card {
      background: #161b22;
      border: 2px solid #30363d;
      border-radius: 10px;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      transition: border-color 0.2s;
    }
    .board-card.mine   { border-color: #3fb950; }
    .board-card.dead   { opacity: 0.5; }
    .board-card.winner { border-color: #e3b341; box-shadow: 0 0 18px rgba(227,179,65,.35); }

    .board-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .player-name { font-weight: 700; font-size: 0.95rem; }
    .player-score { font-size: 1.1rem; font-weight: 700; }
    .player-status { font-size: 0.75rem; color: #8b949e; }

    canvas { display: block; image-rendering: pixelated; }

    /* ── waiting room ─────────────────────────────────────────────── */
    #waiting-card {
      background: #161b22;
      border: 1px dashed #30363d;
      border-radius: 10px;
      padding: 2rem 3rem;
      text-align: center;
      color: #8b949e;
    }
    #waiting-card h3 { color: #58a6ff; margin-bottom: 0.5rem; }
    #player-list { margin: 0.75rem 0; min-height: 1.5rem; }
    #player-list span {
      display: inline-block;
      margin: 0.2rem 0.3rem;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    footer { margin-top: 1.5rem; color: #30363d; font-size: 0.78rem; }

    @media (max-width: 600px) {
      .board-card { width: 100%; }
    }
  </style>
</head>
<body>

<div id="countdown-overlay"></div>
<div id="winner-overlay">
  <h2 id="winner-name">🏆 Winner!</h2>
  <p id="winner-scores"></p>
  <button class="btn-restart" onclick="window.location.href='/'">Back to Lobby</button>
</div>

<header>
  <h1>🐍 Snake Race</h1>
  <span class="room-tag" id="hdr-room">room: —</span>
  <span class="role-tag" id="hdr-role">player</span>
  <a class="back-link" href="/">← Lobby</a>
</header>

<div id="status-bar">
  <span id="status-text">Connecting…</span>
  <span id="target-text"></span>
  <button id="btn-start" class="btn-start" style="display:none" onclick="sendStart()">▶ Start Race</button>
</div>

<div id="boards">
  <div id="waiting-card">
    <h3>Waiting for players…</h3>
    <div id="player-list"></div>
    <p id="waiting-hint" style="font-size:0.8rem;">Share the Room ID with friends to join!</p>
  </div>
</div>

<footer>Arrow keys / WASD to steer &nbsp;·&nbsp; Matopeli — Nokia Snake reimagined</footer>

<script>
// ── configuration ──────────────────────────────────────────────────────────
const CELL = 14;           // pixels per board cell
const BOARD_W = 30;
const BOARD_H = 18;
const CANVAS_W = BOARD_W * CELL;
const CANVAS_H = BOARD_H * CELL;

// ── URL params ──────────────────────────────────────────────────────────────
const pathParts = window.location.pathname.split("/");
const ROOM_ID  = pathParts[pathParts.length - 1];
const params   = new URLSearchParams(window.location.search);
const MY_NAME  = params.get("name") || "Player";
const SPECTATE = params.get("spectate") === "1";

// ── palette per player slot ─────────────────────────────────────────────────
const PLAYER_COLORS = [
  { snake: "#3fb950", food: "#ff7b72" },
  { snake: "#58a6ff", food: "#ffa657" },
  { snake: "#f78166", food: "#d2a8ff" },
  { snake: "#e3b341", food: "#7ee787" },
];

// ── state ───────────────────────────────────────────────────────────────────
let ws = null;
let myPlayerId = null;
let myRole = SPECTATE ? "spectator" : "player";
let canvases  = {};   // player_id → canvas element
let colorMap  = {};   // player_id → color entry

document.getElementById("hdr-room").textContent = `room: ${ROOM_ID}`;
document.getElementById("hdr-role").textContent = SPECTATE ? "👁 spectator" : "🎮 player";

// ── WebSocket ───────────────────────────────────────────────────────────────
function connect() {
  const endpoint = SPECTATE
    ? `ws://${location.host}/ws/race/${ROOM_ID}/spectate`
    : `ws://${location.host}/ws/race/${ROOM_ID}?player_name=${encodeURIComponent(MY_NAME)}`;

  ws = new WebSocket(endpoint);

  ws.onopen = () => {
    document.getElementById("status-text").textContent = "Connected — waiting for players…";
  };

  ws.onmessage = (evt) => {
    try { handleMessage(JSON.parse(evt.data)); }
    catch(e) { console.error("bad message", e); }
  };

  ws.onclose = () => {
    document.getElementById("status-text").textContent = "Disconnected — refresh to reconnect";
  };
}

function sendDir(dir) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: "dir", dir }));
  }
}

function sendStart() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: "start" }));
  }
}

// ── message handler ─────────────────────────────────────────────────────────
function handleMessage(msg) {
  if (msg.type !== "state") return;

  myPlayerId = msg.my_player_id || myPlayerId;
  myRole = msg.role || myRole;
  document.getElementById("hdr-role").textContent =
    myRole === "spectator" ? "👁 spectator" : "🎮 player";

  document.getElementById("target-text").textContent =
    `🎯 Target: ${msg.target_score} pts`;

  // ── countdown overlay ──────────────────────────────────────────────────
  const overlay = document.getElementById("countdown-overlay");
  if (msg.room_state === "countdown" && msg.countdown != null) {
    overlay.style.display = "flex";
    overlay.textContent = msg.countdown;
    document.getElementById("waiting-card") &&
      (document.getElementById("waiting-card").style.display = "none");
  } else {
    overlay.style.display = "none";
  }

  // ── waiting state ──────────────────────────────────────────────────────
  if (msg.room_state === "waiting") {
    setStatusText(`Waiting… ${msg.players.length}/${msg.max_players} players joined`);
    renderWaiting(msg);
    return;
  }

  // ── playing / finished ─────────────────────────────────────────────────
  hideWaiting();

  if (msg.room_state === "finished") {
    document.getElementById("btn-start").style.display = "none";
    const winOverlay = document.getElementById("winner-overlay");
    winOverlay.style.display = "flex";
    document.getElementById("winner-name").textContent =
      `🏆 ${msg.winner} wins!`;
    const scores = msg.players
      .sort((a,b) => b.score - a.score)
      .map(p => `${p.name}: ${p.score}`)
      .join(" · ");
    document.getElementById("winner-scores").textContent = scores;
    setStatusText("Race finished!");
  } else {
    setStatusText("Race in progress!");
  }

  renderBoards(msg);
}

function setStatusText(t) {
  document.getElementById("status-text").textContent = t;
}

// ── waiting room render ──────────────────────────────────────────────────────
function renderWaiting(msg) {
  const wc = document.getElementById("waiting-card");
  if (wc) wc.style.display = "";

  const list = document.getElementById("player-list");
  list.innerHTML = msg.players.map((p, i) => {
    const col = (PLAYER_COLORS[i] || PLAYER_COLORS[0]).snake;
    return `<span style="background:${col}22;color:${col};border:1px solid ${col}">
              ${p.name}${p.player_id === myPlayerId ? " (you)" : ""}
            </span>`;
  }).join("");

  const canStart = msg.players.length >= 2 && myRole === "player";
  document.getElementById("btn-start").style.display = canStart ? "" : "none";
}

function hideWaiting() {
  const wc = document.getElementById("waiting-card");
  if (wc) wc.style.display = "none";
}

// ── boards render ────────────────────────────────────────────────────────────
function renderBoards(msg) {
  const boardsEl = document.getElementById("boards");

  msg.players.forEach((player, idx) => {
    const color = PLAYER_COLORS[idx % PLAYER_COLORS.length];

    // Assign color on first sight.
    if (!colorMap[player.player_id]) colorMap[player.player_id] = color;
    const c = colorMap[player.player_id];

    // Create card + canvas on first sight.
    if (!canvases[player.player_id]) {
      const card = document.createElement("div");
      card.className = "board-card";
      card.id = `card-${player.player_id}`;

      const header = document.createElement("div");
      header.className = "board-header";
      header.innerHTML = `
        <span class="player-name" id="name-${player.player_id}"
              style="color:${c.snake}">${player.name}</span>
        <span>
          <span class="player-score" id="score-${player.player_id}">0</span>
          <span class="player-status" id="status-${player.player_id}"></span>
        </span>`;

      const canvas = document.createElement("canvas");
      canvas.width  = CANVAS_W;
      canvas.height = CANVAS_H;
      canvas.style.width  = CANVAS_W + "px";
      canvas.style.height = CANVAS_H + "px";

      card.appendChild(header);
      card.appendChild(canvas);
      boardsEl.appendChild(card);
      canvases[player.player_id] = canvas;
    }

    const card   = document.getElementById(`card-${player.player_id}`);
    const canvas = canvases[player.player_id];
    const ctx    = canvas.getContext("2d");

    // Update classes.
    card.className = "board-card";
    if (player.player_id === myPlayerId) card.classList.add("mine");
    if (!player.alive)                   card.classList.add("dead");
    if (msg.winner === player.name)       card.classList.add("winner");

    // Update score / status.
    document.getElementById(`score-${player.player_id}`).textContent = player.score;
    const statusEl = document.getElementById(`status-${player.player_id}`);
    if (!player.alive) statusEl.textContent = "💀";
    else if (msg.winner === player.name) statusEl.textContent = "🏆";
    else statusEl.textContent = "";

    // Draw board.
    drawBoard(ctx, player, c);
  });
}

function drawBoard(ctx, player, color) {
  // Background.
  ctx.fillStyle = "#0d1117";
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Grid lines (subtle).
  ctx.strokeStyle = "#161b22";
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= BOARD_W; x++) {
    ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, CANVAS_H); ctx.stroke();
  }
  for (let y = 0; y <= BOARD_H; y++) {
    ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(CANVAS_W, y*CELL); ctx.stroke();
  }

  // Food.
  const [fx, fy] = player.food;
  ctx.fillStyle = color.food;
  ctx.beginPath();
  ctx.arc(fx*CELL + CELL/2, fy*CELL + CELL/2, CELL/2 - 1, 0, Math.PI*2);
  ctx.fill();

  // Snake body.
  const body = player.body;
  for (let i = 0; i < body.length; i++) {
    const [bx, by] = body[i];
    const isHead = i === body.length - 1;
    ctx.fillStyle = isHead
      ? color.snake
      : (player.alive ? color.snake + "bb" : "#444");
    const pad = isHead ? 1 : 2;
    ctx.fillRect(bx*CELL + pad, by*CELL + pad, CELL - pad*2, CELL - pad*2);
  }
}

// ── keyboard controls ────────────────────────────────────────────────────────
const KEY_MAP = {
  ArrowUp: "UP",    w: "UP",    W: "UP",
  ArrowDown: "DOWN", s: "DOWN", S: "DOWN",
  ArrowLeft: "LEFT", a: "LEFT", A: "LEFT",
  ArrowRight: "RIGHT", d: "RIGHT", D: "RIGHT",
};

document.addEventListener("keydown", (e) => {
  if (myRole === "spectator") return;
  const dir = KEY_MAP[e.key];
  if (dir) {
    e.preventDefault();
    sendDir(dir);
  }
});

// ── start ────────────────────────────────────────────────────────────────────
connect();
</script>
</body>
</html>
