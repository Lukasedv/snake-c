<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Multiplayer — Lobby</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 2.5rem;
      color: #3fb950;
      margin-bottom: 0.25rem;
      letter-spacing: 2px;
    }
    .subtitle {
      color: #8b949e;
      margin-bottom: 2.5rem;
      font-size: 0.95rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 540px;
      margin-bottom: 1.5rem;
    }
    .card h2 {
      font-size: 1.1rem;
      color: #58a6ff;
      margin-bottom: 1rem;
    }

    label { display: block; margin-bottom: 0.35rem; color: #8b949e; font-size: 0.85rem; }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 0.55rem 0.75rem;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 0.95rem;
      margin-bottom: 0.9rem;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      outline: none;
      border-color: #58a6ff;
    }

    .row { display: flex; gap: 0.75rem; }
    .row > div { flex: 1; }

    button {
      padding: 0.6rem 1.25rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    .btn-primary { background: #238636; color: #fff; width: 100%; margin-top: 0.25rem; }
    .btn-join    { background: #1f6feb; color: #fff; padding: 0.45rem 1rem; font-size: 0.85rem; }
    .btn-watch   { background: #6e40c9; color: #fff; padding: 0.45rem 1rem; font-size: 0.85rem; }

    #rooms-list { margin-top: 0.5rem; }
    .room-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 0;
      border-bottom: 1px solid #21262d;
      gap: 0.5rem;
    }
    .room-row:last-child { border-bottom: none; }
    .room-id { font-family: monospace; color: #3fb950; font-size: 0.95rem; }
    .room-meta { color: #8b949e; font-size: 0.8rem; flex: 1; margin-left: 0.75rem; }
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      margin-left: 0.4rem;
    }
    .badge-waiting  { background: #1f4428; color: #3fb950; }
    .badge-playing  { background: #452700; color: #e3b341; }
    .badge-finished { background: #2d1f6e; color: #a5a3ff; }

    #empty-msg { color: #8b949e; font-size: 0.9rem; text-align: center; padding: 1rem 0; }

    footer { margin-top: auto; padding-top: 2rem; color: #30363d; font-size: 0.78rem; }
  </style>
</head>
<body>

  <h1>🐍 Snake Multiplayer</h1>
  <p class="subtitle">Race to the top score — spectators welcome</p>

  <!-- Create room -->
  <div class="card">
    <h2>Create a Room</h2>
    <label>Your name</label>
    <input type="text" id="create-name" value="Player" maxlength="20" />
    <div class="row">
      <div>
        <label>Room ID (leave blank for random)</label>
        <input type="text" id="create-room-id" placeholder="e.g. abc123" maxlength="16" />
      </div>
      <div>
        <label>Players (2–4)</label>
        <input type="number" id="create-max-players" value="2" min="2" max="4" />
      </div>
    </div>
    <label>Target score (first to reach wins)</label>
    <input type="number" id="create-target" value="100" min="10" max="1000" step="10" />
    <button class="btn-primary" onclick="createRoom()">Create &amp; Join</button>
  </div>

  <!-- Join existing room -->
  <div class="card">
    <h2>Join by Room ID</h2>
    <label>Your name</label>
    <input type="text" id="join-name" value="Player" maxlength="20" />
    <label>Room ID</label>
    <input type="text" id="join-room-id" placeholder="e.g. abc123" maxlength="16" />
    <button class="btn-primary" style="background:#1f6feb;" onclick="joinRoom()">Join Room</button>
  </div>

  <!-- Live room list -->
  <div class="card">
    <h2>Open Rooms <span id="refresh-hint" style="font-size:0.75rem;color:#8b949e;">(auto-refresh)</span></h2>
    <div id="rooms-list"><p id="empty-msg">Loading…</p></div>
  </div>

  <footer>Matopeli — Nokia Snake reimagined</footer>

<script>
  const playerColors = ["#3fb950","#f78166","#58a6ff","#e3b341"];

  async function loadRooms() {
    try {
      const res = await fetch("/api/rooms");
      const data = await res.json();
      const container = document.getElementById("rooms-list");
      if (!data.rooms.length) {
        container.innerHTML = '<p id="empty-msg">No open rooms yet. Create one above!</p>';
        return;
      }
      container.innerHTML = data.rooms.map(r => {
        const stateClass = `badge-${r.state}`;
        const stateLabel = r.state.charAt(0).toUpperCase() + r.state.slice(1);
        return `
          <div class="room-row">
            <span class="room-id">${r.room_id}</span>
            <span class="room-meta">
              👥 ${r.players}/${r.max_players}
              🎯 ${r.target_score} pts
              👁 ${r.spectators} watching
              <span class="badge ${stateClass}">${stateLabel}</span>
            </span>
            <button class="btn-join" onclick="joinById('${r.room_id}')">Join</button>
            <button class="btn-watch" onclick="watchById('${r.room_id}')">Watch</button>
          </div>`;
      }).join("");
    } catch(e) { /* server may not be ready yet */ }
  }

  function createRoom() {
    const name = document.getElementById("create-name").value.trim() || "Player";
    const roomId = document.getElementById("create-room-id").value.trim();
    const maxPlayers = document.getElementById("create-max-players").value;
    const target = document.getElementById("create-target").value;

    const params = new URLSearchParams({ max_players: maxPlayers, target_score: target });

    if (roomId) {
      // Use a specific room ID
      window.location.href = `/race/${encodeURIComponent(roomId)}?name=${encodeURIComponent(name)}&target_score=${target}`;
    } else {
      fetch(`/api/rooms?${params}`, { method: "POST" })
        .then(r => r.json())
        .then(d => {
          window.location.href = `/race/${d.room_id}?name=${encodeURIComponent(name)}`;
        });
    }
  }

  function joinRoom() {
    const name = document.getElementById("join-name").value.trim() || "Player";
    const roomId = document.getElementById("join-room-id").value.trim();
    if (!roomId) { alert("Please enter a Room ID"); return; }
    window.location.href = `/race/${encodeURIComponent(roomId)}?name=${encodeURIComponent(name)}`;
  }

  function joinById(roomId) {
    const name = prompt("Your name:", "Player") || "Player";
    window.location.href = `/race/${roomId}?name=${encodeURIComponent(name)}`;
  }

  function watchById(roomId) {
    window.location.href = `/race/${roomId}?spectate=1`;
  }

  loadRooms();
  setInterval(loadRooms, 3000);
</script>
</body>
</html>
